<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BaseTrace — Wallet Activity Feed</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060810;
    --surface: #0d1117;
    --border: #1e2535;
    --accent: #0052ff;
    --accent2: #00c2ff;
    --text: #e8edf5;
    --muted: #4a5568;
    --success: #00d395;
    --warning: #ffb800;
    --danger: #ff4757;
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,82,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,82,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 0 20px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    padding: 40px 0 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .logo-text {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .logo-text span {
    color: var(--accent2);
  }

  .tagline {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-left: 48px;
  }

  /* Network badge */
  .network-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(0,82,255,0.1);
    border: 1px solid rgba(0,82,255,0.3);
    border-radius: 20px;
    padding: 4px 12px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent2);
    float: right;
    margin-top: 4px;
  }

  .network-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--success);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Search bar */
  .search-wrap {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
  }

  .input-wrap {
    flex: 1;
    position: relative;
  }

  .input-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 48px 14px 18px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .input-wrap input:focus {
    border-color: var(--accent);
  }

  .input-wrap input::placeholder {
    color: var(--muted);
  }

  .input-icon {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 16px;
  }

  .btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px 28px;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn:hover { background: #0041cc; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Wallet summary card */
  .wallet-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 28px;
    display: none;
    animation: fadeUp 0.3s ease;
  }

  .wallet-card.show { display: block; }

  .wallet-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 20px;
  }

  .wallet-address {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent2);
    word-break: break-all;
  }

  .wallet-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }

  .stat-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
  }

  .stat-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .stat-value {
    font-size: 20px;
    font-weight: 800;
    color: var(--text);
  }

  .stat-value.green { color: var(--success); }
  .stat-value.blue { color: var(--accent2); }

  /* Filter bar */
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    display: none;
  }

  .filter-bar.show { display: flex; }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 14px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent2);
    background: rgba(0,82,255,0.08);
  }

  /* Tx list */
  .tx-list { display: none; }
  .tx-list.show { display: block; }

  .tx-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 10px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 16px;
    align-items: center;
    transition: border-color 0.2s, transform 0.2s;
    animation: fadeUp 0.3s ease both;
    cursor: pointer;
  }

  .tx-item:hover {
    border-color: rgba(0,82,255,0.4);
    transform: translateX(4px);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .tx-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .tx-icon.in { background: rgba(0,211,149,0.12); }
  .tx-icon.out { background: rgba(255,71,87,0.12); }
  .tx-icon.contract { background: rgba(0,194,255,0.12); }
  .tx-icon.self { background: rgba(255,184,0,0.12); }

  .tx-main {}

  .tx-type {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .tx-type.in { color: var(--success); }
  .tx-type.out { color: var(--danger); }
  .tx-type.contract { color: var(--accent2); }
  .tx-type.self { color: var(--warning); }

  .tx-meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  .tx-meta span { color: var(--text); }

  .tx-right { text-align: right; }

  .tx-value {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .tx-value.in { color: var(--success); }
  .tx-value.out { color: var(--danger); }
  .tx-value.zero { color: var(--muted); }

  .tx-time {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
  }

  .tx-hash-badge {
    display: inline-block;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent2);
    background: rgba(0,194,255,0.08);
    border: 1px solid rgba(0,194,255,0.2);
    border-radius: 4px;
    padding: 2px 6px;
    margin-top: 4px;
    text-decoration: none;
    transition: background 0.15s;
  }

  .tx-hash-badge:hover { background: rgba(0,194,255,0.18); }

  /* Loading */
  .loader {
    text-align: center;
    padding: 60px 0;
    display: none;
  }

  .loader.show { display: block; }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loader p {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }

  /* Error */
  .error-box {
    background: rgba(255,71,87,0.08);
    border: 1px solid rgba(255,71,87,0.3);
    border-radius: 10px;
    padding: 16px 20px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--danger);
    display: none;
    margin-bottom: 20px;
  }

  .error-box.show { display: block; }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 0;
    display: none;
  }

  .empty.show { display: block; }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty p { color: var(--muted); font-family: var(--mono); font-size: 12px; }

  /* Load more */
  .load-more-wrap {
    text-align: center;
    padding: 20px 0 40px;
    display: none;
  }

  .load-more-wrap.show { display: block; }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 10px;
    padding: 12px 28px;
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-outline:hover {
    border-color: var(--accent);
    color: var(--accent2);
  }

  /* Footer */
  footer {
    border-top: 1px solid var(--border);
    padding: 24px 0;
    text-align: center;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-top: 20px;
  }

  footer a { color: var(--accent2); text-decoration: none; }

  @media (max-width: 600px) {
    .stats-row { grid-template-columns: 1fr 1fr; }
    .tx-item { grid-template-columns: auto 1fr; }
    .tx-right { display: none; }
    .network-badge { float: none; margin-top: 12px; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">
      <div class="logo-icon">🔍</div>
      <div class="logo-text">Base<span>Trace</span></div>
    </div>
    <div class="tagline">Wallet Activity Feed · Base Network</div>
    <div class="network-badge">
      <div class="network-dot"></div>
      Base Mainnet
    </div>
  </header>

  <!-- Search -->
  <div class="search-wrap">
    <div class="input-wrap">
      <input type="text" id="walletInput" placeholder="Enter any wallet address (0x...)" autocomplete="off" spellcheck="false" />
      <span class="input-icon">⌕</span>
    </div>
    <button class="btn" id="searchBtn" onclick="fetchWallet()">Trace</button>
  </div>

  <!-- Error -->
  <div class="error-box" id="errorBox"></div>

  <!-- Wallet Summary -->
  <div class="wallet-card" id="walletCard">
    <div class="wallet-header">
      <div>
        <div class="wallet-label">Wallet Address</div>
        <div class="wallet-address" id="displayAddress"></div>
      </div>
      <a id="basescanLink" href="#" target="_blank" class="tx-hash-badge" style="margin-top:8px">View on BaseScan ↗</a>
    </div>
    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-label">Transactions</div>
        <div class="stat-value blue" id="statTx">—</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">ETH Received</div>
        <div class="stat-value green" id="statIn">—</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">ETH Sent</div>
        <div class="stat-value" id="statOut">—</div>
      </div>
    </div>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('in', this)">Incoming</button>
    <button class="filter-btn" onclick="setFilter('out', this)">Outgoing</button>
    <button class="filter-btn" onclick="setFilter('contract', this)">Contract</button>
  </div>

  <!-- Loader -->
  <div class="loader" id="loader">
    <div class="spinner"></div>
    <p>Scanning Base network...</p>
  </div>

  <!-- Tx List -->
  <div class="tx-list" id="txList"></div>

  <!-- Empty -->
  <div class="empty" id="emptyState">
    <div class="empty-icon">📭</div>
    <p>No transactions found for this filter.</p>
  </div>

  <!-- Load More -->
  <div class="load-more-wrap" id="loadMoreWrap">
    <button class="btn-outline" onclick="loadMore()">Load More Transactions</button>
  </div>

  <footer>
    Built on <a href="https://base.org" target="_blank">Base</a> · Data via <a href="https://basescan.org" target="_blank">BaseScan API</a>
  </footer>
</div>

<script>
  const API_KEY = 'K7UTMGSXDBKWUHHXYRBEQWRB49SVN59MAN';
  const API_BASE = 'https://api.basescan.org/v2/api';

  let allTxs = [];
  let currentFilter = 'all';
  let currentPage = 1;
  let currentAddress = '';
  const PAGE_SIZE = 20;

  // Enter key support
  document.getElementById('walletInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') fetchWallet();
  });

  async function fetchWallet() {
    const input = document.getElementById('walletInput').value.trim();
    if (!input) return showError('Please enter a wallet address.');
    if (!/^0x[a-fA-F0-9]{40}$/.test(input)) return showError('Invalid wallet address format.');

    currentAddress = input;
    currentPage = 1;
    allTxs = [];

    hideAll();
    showLoader(true);
    clearError();

    try {
      const [txRes, balRes] = await Promise.all([
        fetch(`${API_BASE}?chainid=8453&module=account&action=txlist&address=${input}&startblock=0&endblock=99999999&page=1&offset=100&sort=desc&apikey=${API_KEY}`),
        fetch(`${API_BASE}?chainid=8453&module=account&action=balance&address=${input}&tag=latest&apikey=${API_KEY}`)
      ]);

      const txData = await txRes.json();
      const balData = await balRes.json();

      showLoader(false);

      if (txData.status === '0' && txData.message !== 'No transactions found') {
        return showError('API error: ' + (txData.result || 'Unable to fetch transactions.'));
      }

      allTxs = txData.result || [];

      // Stats
      let totalIn = 0, totalOut = 0;
      allTxs.forEach(tx => {
        const val = parseFloat(tx.value) / 1e18;
        if (tx.to?.toLowerCase() === input.toLowerCase()) totalIn += val;
        if (tx.from?.toLowerCase() === input.toLowerCase()) totalOut += val;
      });

      document.getElementById('displayAddress').textContent = input;
      document.getElementById('basescanLink').href = `https://basescan.org/address/${input}`;
      document.getElementById('statTx').textContent = allTxs.length;
      document.getElementById('statIn').textContent = totalIn.toFixed(4) + ' ETH';
      document.getElementById('statOut').textContent = totalOut.toFixed(4) + ' ETH';

      document.getElementById('walletCard').classList.add('show');
      document.getElementById('filterBar').classList.add('show');

      renderTxs();

    } catch (err) {
      showLoader(false);
      showError('Network error. Check your connection and try again.');
    }
  }

  function renderTxs() {
    const list = document.getElementById('txList');
    const address = currentAddress.toLowerCase();

    let filtered = allTxs.filter(tx => {
      if (currentFilter === 'in') return tx.to?.toLowerCase() === address;
      if (currentFilter === 'out') return tx.from?.toLowerCase() === address && tx.to !== '';
      if (currentFilter === 'contract') return tx.input !== '0x' || tx.to === '';
      return true;
    });

    const paginated = filtered.slice(0, currentPage * PAGE_SIZE);

    if (filtered.length === 0) {
      list.classList.remove('show');
      document.getElementById('emptyState').classList.add('show');
      document.getElementById('loadMoreWrap').classList.remove('show');
      return;
    }

    document.getElementById('emptyState').classList.remove('show');
    list.classList.add('show');

    list.innerHTML = paginated.map((tx, i) => {
      const isIn = tx.to?.toLowerCase() === address;
      const isSelf = tx.from?.toLowerCase() === address && tx.to?.toLowerCase() === address;
      const isContract = tx.input !== '0x' && tx.input !== '';
      const value = parseFloat(tx.value) / 1e18;
      const date = new Date(parseInt(tx.timeStamp) * 1000);
      const timeAgo = getTimeAgo(date);
      const hash = tx.hash;
      const shortHash = hash.slice(0, 8) + '...' + hash.slice(-6);
      const otherAddr = isIn ? tx.from : tx.to;
      const shortAddr = otherAddr ? otherAddr.slice(0, 6) + '...' + otherAddr.slice(-4) : 'Contract Creation';

      let type, icon, typeClass;
      if (isSelf) { type = 'Self Transfer'; icon = '↺'; typeClass = 'self'; }
      else if (isContract) { type = 'Contract Interaction'; icon = '⚡'; typeClass = 'contract'; }
      else if (isIn) { type = 'Received'; icon = '↓'; typeClass = 'in'; }
      else { type = 'Sent'; icon = '↑'; typeClass = 'out'; }

      const valueStr = value === 0 ? '0 ETH' : (isIn ? '+' : '-') + value.toFixed(6) + ' ETH';
      const valueClass = value === 0 ? 'zero' : isIn ? 'in' : 'out';

      return `<div class="tx-item" style="animation-delay:${i * 0.03}s" onclick="window.open('https://basescan.org/tx/${hash}', '_blank')">
        <div class="tx-icon ${typeClass}">${icon}</div>
        <div class="tx-main">
          <div class="tx-type ${typeClass}">${type}</div>
          <div class="tx-meta">${isIn ? 'From' : 'To'}: <span>${shortAddr}</span></div>
          <a class="tx-hash-badge" href="https://basescan.org/tx/${hash}" target="_blank" onclick="event.stopPropagation()">${shortHash}</a>
        </div>
        <div class="tx-right">
          <div class="tx-value ${valueClass}">${valueStr}</div>
          <div class="tx-time">${timeAgo}</div>
        </div>
      </div>`;
    }).join('');

    // Load more
    const wrap = document.getElementById('loadMoreWrap');
    if (paginated.length < filtered.length) {
      wrap.classList.add('show');
    } else {
      wrap.classList.remove('show');
    }
  }

  function loadMore() {
    currentPage++;
    renderTxs();
  }

  function setFilter(filter, btn) {
    currentFilter = filter;
    currentPage = 1;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTxs();
  }

  function getTimeAgo(date) {
    const diff = Math.floor((Date.now() - date) / 1000);
    if (diff < 60) return diff + 's ago';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    return Math.floor(diff / 86400) + 'd ago';
  }

  function showLoader(v) {
    document.getElementById('loader').classList.toggle('show', v);
    document.getElementById('searchBtn').disabled = v;
  }

  function hideAll() {
    document.getElementById('walletCard').classList.remove('show');
    document.getElementById('filterBar').classList.remove('show');
    document.getElementById('txList').classList.remove('show');
    document.getElementById('emptyState').classList.remove('show');
    document.getElementById('loadMoreWrap').classList.remove('show');
  }

  function showError(msg) {
    const box = document.getElementById('errorBox');
    box.textContent = '⚠ ' + msg;
    box.classList.add('show');
  }

  function clearError() {
    document.getElementById('errorBox').classList.remove('show');
  }
</script>
</body>
</html>
